# https://worktrunk.dev/config/
worktree-path = "{{ repo_path }}/../{{ repo }}.{{ branch | sanitize }}"
post-start= [{ copy_env = "wt step copy-ignored", update_submodule = "git submodule update --init --recursive", pnpm_install = "pnpm install --no-frozen-lockfile" }, { allow_direnv = "direnv allow . || true" }]
skip-shell-integration-prompt = true
